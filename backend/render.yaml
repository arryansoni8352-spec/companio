services:
  - type: web
    name: companio-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start:prod
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 90d
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        value: https://frontend-lake-nine-29.vercel.app
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: ./uploads
