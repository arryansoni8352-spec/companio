services:
  - type: web
    name: companio-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma db push && npm run start:prod
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        value: companio-jwt-secret-change-in-production-2024
      - key: JWT_REFRESH_SECRET
        value: companio-refresh-secret-change-in-production-2024
      - key: JWT_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 90d
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        value: https://frontend-lake-nine-29.vercel.app
      - key: NODE_ENV
        value: production
